services:
  db:
    image: postgres:18-alpine
    container_name: supplierfinder_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT_EXTERNAL}:${POSTGRES_PORT_INNER}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - supplierfinder_network

  redis:
    image: redis:8.0-alpine
    container_name: supplierfinder_redis
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT_EXTERNAL}:${REDIS_PORT_INNER}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - supplierfinder_network
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --tcp-keepalive 60
      --databases 6

  migrate:
    build:
      context: .
      target: base
    image: supplierfinder/migrate:latest
    container_name: supplierfinder_migrate
    command: alembic upgrade head
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supplierfinder_network
    restart: on-failure

  api:
    build:
      context: .
      target: api
    image: supplierfinder/api:latest
    container_name: supplierfinder_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - supplierfinder_network

  api_parser:
    build:
      context: .
      target: parser_api
    image: supplierfinder/parser:latest
    container_name: supplierfinder_parser
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PARSER_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - supplierfinder_network

  worker:
    build:
      context: .
      target: worker
    image: supplierfinder/worker:latest
    container_name: supplierfinder_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app.celery_config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - supplierfinder_network

  beat:
    build:
      context: .
      target: beat
    image: supplierfinder/beat:latest
    container_name: supplierfinder_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/celerybeat/celerybeat-schedule || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - supplierfinder_network

volumes:
  pgdata:
  redisdata:

networks:
  supplierfinder_network:
    driver: bridge
    name: supplierfinder_network
