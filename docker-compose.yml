services:
  db:
    image: postgres:18-alpine
    container_name: tenderoptima_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - tenderoptima_network

  redis:
    image: redis:8.0-alpine
    container_name: tenderoptima_redis
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - tenderoptima_network
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --tcp-keepalive 60
      --databases 6

  migrate:
    build:
      context: ./services/backend
      target: base
    image: tenderoptima/migrate:latest
    container_name: tenderoptima_migrate
    command: >
      sh -c "alembic -c backend/alembic.ini upgrade head
      && python -m backend.scripts.basic_email_templates"
    env_file:
      - ./services/backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tenderoptima_network
    restart: on-failure

  backend:
    build:
      context: ./services/backend
      target: backend
    image: tenderoptima/backend:latest
    container_name: tenderoptima_backend
    restart: unless-stopped
    env_file: ./services/backend/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - uploads:/app/uploads
    networks:
      - tenderoptima_network

  parser:
    build:
      context: ./services/parser
    image: tenderoptima/parser:latest
    container_name: tenderoptima_parser
    restart: unless-stopped
    env_file: ./services/parser/.env
    ports:
      - "${PARSER_PORT:-8010}:8010"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tenderoptima_network

  worker:
    build:
      context: ./services/backend
      target: worker
    image: tenderoptima/worker:latest
    container_name: tenderoptima_worker
    restart: unless-stopped
    env_file: ./services/backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      parser:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A backend.celery_app.celery_config inspect ping -d celery@$$HOSTNAME || exit 1",
        ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - uploads:/app/uploads
    networks:
      - tenderoptima_network

  beat:
    build:
      context: ./services/backend
      target: beat
    image: tenderoptima/beat:latest
    container_name: tenderoptima_beat
    restart: unless-stopped
    env_file: ./services/backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "test -f /app/celerybeat/celerybeat-schedule || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - tenderoptima_network

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    image: tenderoptima/frontend:latest
    container_name: tenderoptima_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NUXT_BACKEND_INTERNAL_URL: http://backend:8000
    env_file:
      - ./services/frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tenderoptima_network

volumes:
  pgdata:
  redisdata:
  uploads:

networks:
  tenderoptima_network:
    driver: bridge
    name: tenderoptima_network
