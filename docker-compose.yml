services:
  # PostgreSQL Database
  db:
    image: postgres:18-alpine
    container_name: supplierfinder_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env # Override by passing --env-file
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT_EXTERNAL}:${POSTGRES_PORT_INNER}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - supplierfinder_network

  redis:
    image: redis:8.0-alpine
    container_name: supplierfinder_redis
    restart: unless-stopped
    env_file:
      - .env # Override by passing --env-file
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT_EXTERNAL}:${REDIS_PORT_INNER}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - supplierfinder_network
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --tcp-keepalive 60
      --databases 2

volumes:
  pgdata:
  redisdata:

networks:
  supplierfinder_network:
    driver: bridge
    name: supplierfinder_network
