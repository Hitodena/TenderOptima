# docker-compose.yml
version: '3.8'

services:
  # Сервис для основного Node.js приложения (фронтенд + бэкенд)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Пробрасываем порт 5000 с нашего компьютера в контейнер
      - "5000:5000"
    env_file:
      # Указываем Docker использовать наш .env файл для переменных окружения
      - .env
    depends_on:
      # Говорим, что этот сервис зависит от парсера и должен стартовать после него
      - parser
    restart: unless-stopped

  # Сервис для Python FastAPI парсера
  parser:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      # Пробрасываем порт 8080 с нашего компьютера в контейнер
      - "8080:8080"
    env_file:
      # Парсер тоже использует переменные из .env файла (например, API ключи)
      - .env
    restart: unless-stopped