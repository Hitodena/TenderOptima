<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест обработки неверного пароля</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>Тест обработки неверного пароля</h1>
    <p>Этот тест проверяет, что при вводе неверного пароля система корректно показывает ошибку без зависания.</p>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Email:</label>
            <input type="email" id="username" name="username" value="test@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль (введите неверный):</label>
            <input type="password" id="password" name="password" value="wrongpassword" required>
        </div>
        <button type="submit">Войти</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            console.log('Попытка входа с неверным паролем...');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Ответ сервера:', response.status, response.statusText);
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = '<div class="success">✅ Успешный вход! (Это не должно произойти с неверным паролем)</div>';
                    console.log('Данные ответа:', data);
                } else {
                    const errorData = await response.json();
                    resultDiv.innerHTML = `<div class="error">❌ Ошибка входа: ${errorData.error}</div>`;
                    console.log('Ошибка:', errorData);
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Ошибка сети: ${error.message}</div>`;
                console.error('Ошибка сети:', error);
            }
        });
    </script>
</body>
</html>
