<!DOCTYPE html>
<html>
<head>
    <title>Test localStorage</title>
</head>
<body>
    <h1>Test localStorage</h1>
    <div id="output"></div>
    
    <script>
        function testLocalStorage() {
            const output = document.getElementById('output');
            
            // Test localStorage
            localStorage.setItem('test-key', 'test-value');
            const testValue = localStorage.getItem('test-key');
            
            output.innerHTML = `
                <h2>localStorage Test:</h2>
                <p>Test key: ${testValue}</p>
                <p>All keys: ${Object.keys(localStorage).join(', ')}</p>
                <p>accessToken: ${localStorage.getItem('accessToken') || 'NOT FOUND'}</p>
                <p>tokenExpiry: ${localStorage.getItem('tokenExpiry') || 'NOT FOUND'}</p>
            `;
        }
        
        testLocalStorage();
    </script>
</body>
</html>
